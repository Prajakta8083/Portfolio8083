<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portfolio Admin</title>
    <!-- Reuse Core Styles -->
    <link rel="stylesheet" href="public/css/variables.css">
    <link rel="stylesheet" href="public/css/style.css">
    <link rel="stylesheet" href="public/css/admin.css">
</head>

<body class="admin-body">

    <!-- Login Overlay -->
    <div id="login-overlay" class="login-wrapper">
        <div class="login-box">
            <h2 class="mono">System Access</h2>
            <form id="login-form">
                <div class="form-group">
                    <input type="password" id="admin-password" placeholder="Enter Key..." required>
                </div>
                <button type="submit" class="btn btn-primary w-100">Unlock</button>
            </form>
            <p id="login-error" class="text-xs text-error mt-2"></p>
        </div>
    </div>

    <!-- Admin Dashboard (Hidden by default) -->
    <div id="admin-dashboard" class="hidden">
        <header class="admin-header">
            <div class="container nav-content">
                <span class="mono">Admin<span class="text-accent">.panel</span></span>
                <button id="logout-btn" class="btn btn-outline btn-sm">Logout</button>
            </div>
        </header>

        <main class="container section">
            <div class="admin-grid">
                <!-- Sidebar -->
                <aside class="admin-sidebar">
                    <ul class="admin-nav">
                        <li class="active" data-tab="profile">Profile</li>
                        <li data-tab="projects">Projects</li>
                        <li data-tab="skills">Skills</li>
                        <li data-tab="curiosity">Curiosity (AI)</li>
                    </ul>
                </aside>

                <!-- Editor Area -->
                <section class="admin-editor">
                    <div id="editor-header" class="editor-header">
                        <h2 id="current-section-title">Edit Profile</h2>
                        <button id="save-btn" class="btn btn-primary">Save Changes</button>
                    </div>

                    <div id="editor-content">
                        <!-- JSON Editor will be injected here -->
                        <textarea id="json-editor" class="json-textarea" spellcheck="false"></textarea>
                    </div>
                    <div id="save-status" class="text-xs text-muted mt-2"></div>
                </section>
            </div>
        </main>
    </div>

    <script type="module" src="public/js/admin.js"></script>
</body>

</html>
